<!-- СПЕЦИФИЧНЫЕ МОДАЛЬНЫЕ ОКНА ДЛЯ АДМИНИСТРАТОРА -->

<!-- Модальное окно для добавления/редактирования пользователя -->
<div id="user-modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3 id="user-modal-title">Добавление пользователя</h3>
        <form id="user-form">
            <input type="hidden" id="user-id" name="id">
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="user-name" name="name" required>
            </div>
            <div class="form-group">
                <label>Фамилия</label>
                <input type="text" id="user-surname" name="surname" required>
            </div>
            <div class="form-group">
                <label>Отчество</label>
                <input type="text" id="user-patronymic" name="patronymic">
            </div>
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="user-login" name="login" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="user-password" name="password">
                <small>Оставьте пустым, чтобы не менять пароль</small>
            </div>
            <div class="form-group">
                <label>Роль</label>
                <select id="user-role-id" name="role_id" required>
                    <option value="">Выберите роль</option>
                    {% for role in roles %}
                    <option value="{{ role.role_id }}">{{ role.role_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn-primary">Сохранить</button>
        </form>
    </div>
</div>

<!-- Модальное окно для добавления/редактирования маршрута -->
<div id="route-modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3 id="route-modal-title">Добавление маршрута</h3>
        <form id="route-form">
            <input type="hidden" id="route-id" name="id">
            <div class="form-group">
                <label>Номер маршрута</label>
                <input type="number" id="route-number" name="number" required min="1">
            </div>
            <div class="form-group">
                <label>Название маршрута</label>
                <input type="text" id="route-name" name="name" required placeholder="Талдом - Дубна">
            </div>
            <div class="form-group">
                <label>Тип транспорта</label>
                <select id="route-transport-type-id" name="transport_type_id" required>
                    <option value="">Выберите тип</option>
                    {% for transport_type in transport_types %}
                    <option value="{{ transport_type.type_id }}">{{ transport_type.type_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn-primary">Сохранить</button>
        </form>
    </div>
</div>

<!-- Модальное окно для добавления/редактирования транспорта -->
<div id="transport-modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3 id="transport-modal-title">Добавление транспорта</h3>
        <form id="transport-form">
            <input type="hidden" id="transport-id" name="id">
            <div class="form-group">
                <label>Модель</label>
                <input type="text" id="transport-model" name="model" required>
            </div>
            <div class="form-group">
                <label>Вместимость (кол-во мест)</label>
                <input type="number" id="transport-capacity" name="capacity" required min="1">
            </div>
            <div class="form-group">
                <label>Тип транспорта</label>
                <select id="transport-type-id" name="type_id" required>
                    <option value="">Выберите тип</option>
                    {% for transport_type in transport_types %}
                    <option value="{{ transport_type.type_id }}">{{ transport_type.type_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Маршрут</label>
                <select id="transport-route-id" name="route_id" required>
                    <option value="">Выберите маршрут</option>
                    {% for route in routes %}
                    <option value="{{ route.route_id }}">{{ route.route_number }} {{ route.route_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Номер транспортного средства</label>
                <input type="text" id="transport-vehicle-number" name="vehicle_number" required placeholder="А123ВС">
            </div>
            <button type="submit" class="btn-primary">Сохранить</button>
        </form>
    </div>
</div>
